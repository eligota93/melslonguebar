<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mels Longue Bar | Menu Digjitale</title>
  <meta name="description" content="Menu digjitale premium për Mels Longue Bar." />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --bg: #030303;
      --bg-2: #080808;
      --panel: rgba(17, 17, 17, 0.74);
      --panel-strong: rgba(24, 21, 15, 0.88);
      --gold: #d8b34a;
      --gold-2: #f4db83;
      --gold-dim: rgba(216, 179, 74, 0.34);
      --text: #f5f1e6;
      --muted: rgba(245, 241, 230, 0.66);
      --line: rgba(216, 179, 74, 0.22);
      --shadow: 0 20px 55px rgba(0, 0, 0, 0.7);
      --radius: 22px;
      --search-height: 70px;
      --nav-height: 66px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
      background: #000;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(216, 179, 74, 0.14), transparent 32rem),
        radial-gradient(circle at bottom, rgba(157, 119, 24, 0.12), transparent 28rem),
        #000;
      display: flex;
      justify-content: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.22;
      background-image:
        linear-gradient(115deg, transparent 0 35%, rgba(255,255,255,0.04) 35.4%, transparent 36% 100%),
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08) 0 1px, transparent 1.4px),
        radial-gradient(circle at 70% 60%, rgba(216,179,74,0.16) 0 1px, transparent 1.7px);
      background-size: 240px 240px, 34px 34px, 52px 52px;
      mix-blend-mode: screen;
    }

    .phone-frame {
      width: min(100%, 430px);
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.035), transparent 15rem),
        radial-gradient(circle at 50% 0%, rgba(216, 179, 74, 0.11), transparent 24rem),
        var(--bg);
      position: relative;
      overflow-x: hidden;
      isolation: isolate;
    }

    @media (min-width: 560px) {
      body {
        padding: 24px 0;
        align-items: flex-start;
      }

      .phone-frame {
        min-height: calc(100vh - 48px);
        border: 1px solid rgba(216, 179, 74, 0.22);
        border-radius: 34px;
        overflow: clip;
        box-shadow:
          0 0 0 10px rgba(255,255,255,0.025),
          0 35px 100px rgba(0, 0, 0, 0.82),
          inset 0 1px 0 rgba(255,255,255,0.07);
      }
    }

    .search-shell {
      position: sticky;
      top: 0;
      z-index: 50;
      min-height: var(--search-height);
      padding: 12px 14px 10px;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.96), rgba(0,0,0,0.86)),
        rgba(0,0,0,0.92);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(216, 179, 74, 0.16);
    }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 46px;
      border: 1px solid rgba(216, 179, 74, 0.35);
      border-radius: 999px;
      padding: 0 8px 0 16px;
      background:
        linear-gradient(145deg, rgba(31, 27, 17, 0.78), rgba(7, 7, 7, 0.82));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), 0 0 0 rgba(216, 179, 74, 0);
      transition: border 220ms ease, box-shadow 220ms ease, transform 220ms ease;
    }

    .search-wrap:focus-within {
      border-color: rgba(244, 219, 131, 0.78);
      box-shadow: 0 0 28px rgba(216, 179, 74, 0.18), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .search-mark {
      width: 15px;
      height: 15px;
      flex: 0 0 auto;
      border: 1.8px solid var(--gold);
      border-radius: 50%;
      position: relative;
      opacity: 0.9;
    }

    .search-mark::after {
      content: "";
      width: 7px;
      height: 1.8px;
      background: var(--gold);
      position: absolute;
      right: -6px;
      bottom: -3px;
      transform: rotate(45deg);
      border-radius: 4px;
    }

    #searchInput {
      flex: 1;
      width: 100%;
      height: 46px;
      border: 0;
      outline: 0;
      color: var(--text);
      background: transparent;
      font-size: 14px;
      letter-spacing: 0.01em;
    }

    #searchInput::placeholder {
      color: rgba(245, 241, 230, 0.46);
    }

    #clearSearch {
      border: 1px solid rgba(216, 179, 74, 0.28);
      color: var(--gold-2);
      background: rgba(216, 179, 74, 0.08);
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      opacity: 0;
      transform: translateX(5px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease, background 180ms ease;
    }

    #clearSearch.is-visible {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .hero {
      padding: 34px 22px 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid rgba(216, 179, 74, 0.14);
      background:
        radial-gradient(circle at 50% 32%, rgba(216, 179, 74, 0.22), transparent 16rem),
        linear-gradient(180deg, rgba(25, 22, 14, 0.6), rgba(0,0,0,0.2));
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: -40px;
      opacity: 0.26;
      pointer-events: none;
      background:
        repeating-radial-gradient(circle at 50% 45%, transparent 0 21px, rgba(216,179,74,0.16) 22px 23px, transparent 24px 48px),
        linear-gradient(135deg, transparent, rgba(255,255,255,0.04), transparent);
      mask-image: radial-gradient(circle at 50% 50%, black, transparent 70%);
      animation: breathe 7s ease-in-out infinite;
    }

    .logo-aura {
      width: min(72vw, 275px);
      margin: 0 auto 18px;
      padding: 8px;
      border-radius: 28px;
      position: relative;
      animation: logoRise 920ms cubic-bezier(.2,.9,.2,1) both;
    }

    .logo-aura::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background: rgba(216, 179, 74, 0.18);
      filter: blur(34px);
      z-index: -1;
    }

    .brand-logo {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 0 23px rgba(216, 179, 74, 0.35));
    }

    .eyebrow {
      margin: 0 auto 12px;
      width: fit-content;
      color: var(--gold-2);
      border: 1px solid rgba(216, 179, 74, 0.32);
      background: rgba(216, 179, 74, 0.07);
      border-radius: 999px;
      padding: 8px 13px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Cinzel', Georgia, serif;
      margin: 0;
      font-size: clamp(32px, 9.2vw, 46px);
      line-height: 0.98;
      letter-spacing: 0.03em;
      color: var(--text);
      text-shadow: 0 0 30px rgba(216,179,74,0.26);
    }

    .subtitle {
      margin: 12px 0 0;
      color: var(--gold);
      font-family: 'Cinzel', Georgia, serif;
      font-size: 15px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .support {
      margin: 11px auto 0;
      max-width: 280px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .category-nav {
      position: sticky;
      top: var(--search-height);
      z-index: 45;
      min-height: var(--nav-height);
      padding: 11px 0 12px;
      border-bottom: 1px solid rgba(216, 179, 74, 0.16);
      background: rgba(2, 2, 2, 0.86);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .category-track {
      display: flex;
      gap: 9px;
      overflow-x: auto;
      padding: 0 14px;
      scroll-padding: 14px;
      scrollbar-width: none;
    }

    .category-track::-webkit-scrollbar {
      display: none;
    }

    .category-btn {
      flex: 0 0 auto;
      border: 1px solid rgba(216, 179, 74, 0.24);
      color: rgba(245, 241, 230, 0.74);
      background: linear-gradient(145deg, rgba(24,24,24,0.92), rgba(12,12,12,0.92));
      border-radius: 999px;
      padding: 12px 15px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: color 200ms ease, border 200ms ease, background 200ms ease, transform 200ms ease, box-shadow 200ms ease;
      white-space: nowrap;
    }

    .category-btn.is-active {
      color: #171103;
      border-color: rgba(244, 219, 131, 0.92);
      background: linear-gradient(135deg, var(--gold-2), var(--gold));
      box-shadow: 0 0 22px rgba(216, 179, 74, 0.28);
      transform: translateY(-1px);
    }

    main {
      padding: 18px 14px 26px;
    }

    .status-line {
      min-height: 22px;
      margin: 0 3px 10px;
      color: rgba(245, 241, 230, 0.58);
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    .menu-section {
      scroll-margin-top: calc(var(--search-height) + var(--nav-height) + 18px);
      padding: 16px 0 22px;
    }

    .section-head {
      display: flex;
      align-items: flex-end;
      gap: 13px;
      margin: 0 2px 15px;
    }

    .section-title {
      font-family: 'Cinzel', Georgia, serif;
      color: var(--gold-2);
      font-size: 24px;
      line-height: 1;
      margin: 0;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .section-rule {
      height: 1px;
      flex: 1;
      background: linear-gradient(90deg, rgba(216,179,74,0.52), transparent);
      margin-bottom: 5px;
    }

    .section-count {
      color: rgba(245, 241, 230, 0.48);
      font-size: 12px;
      margin-bottom: -1px;
      white-space: nowrap;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .menu-card {
      position: relative;
      display: grid;
      grid-template-columns: 104px 1fr;
      min-height: 122px;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid rgba(216, 179, 74, 0.19);
      background:
        linear-gradient(145deg, rgba(255,255,255,0.055), rgba(255,255,255,0.01)),
        rgba(16, 16, 16, 0.74);
      box-shadow: 0 14px 34px rgba(0,0,0,0.34), inset 0 1px 0 rgba(255,255,255,0.06);
      opacity: 0;
      transform: translateY(18px);
      transition:
        opacity 550ms ease,
        transform 550ms ease,
        border-color 220ms ease,
        box-shadow 220ms ease;
    }

    .menu-card.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .menu-card:active {
      transform: scale(0.992);
    }

    .menu-card::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 10% 0%, rgba(216,179,74,0.15), transparent 12rem);
      opacity: 0;
      transition: opacity 240ms ease;
    }

    .menu-card:hover {
      border-color: rgba(216, 179, 74, 0.4);
      box-shadow: 0 18px 42px rgba(0,0,0,0.44), 0 0 24px rgba(216,179,74,0.09), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .menu-card:hover::after {
      opacity: 1;
    }

    .photo {
      position: relative;
      min-height: 122px;
      background:
        radial-gradient(circle at center, rgba(216,179,74,0.18), transparent 60%),
        #0b0b0b;
      overflow: hidden;
    }

    .photo img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      filter: saturate(0.92) contrast(1.08) brightness(0.86);
      transform: scale(1.02);
      transition: transform 420ms ease, filter 420ms ease;
      cursor: pointer;
    }

    .menu-card:hover .photo img {
      transform: scale(1.08);
      filter: saturate(1.02) contrast(1.1) brightness(0.93);
    }

    .photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(0,0,0,0.52));
      pointer-events: none;
    }

    .card-info {
      padding: 15px 14px 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
      position: relative;
      z-index: 1;
    }

    .item-name {
      margin: 0;
      color: var(--text);
      font-size: 15px;
      line-height: 1.28;
      font-weight: 750;
      letter-spacing: -0.01em;
    }

    .item-cat {
      margin-top: 7px;
      color: rgba(216, 179, 74, 0.78);
      font-family: 'Cinzel', Georgia, serif;
      font-size: 10.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 13px;
    }

    .mini-line {
      height: 1px;
      flex: 1;
      background: linear-gradient(90deg, rgba(216,179,74,0.28), transparent);
    }

    .price {
      flex: 0 0 auto;
      color: var(--gold-2);
      font-weight: 800;
      letter-spacing: 0.02em;
      font-size: 14px;
      text-shadow: 0 0 16px rgba(216,179,74,0.28);
    }

    .no-results {
      display: none;
      margin: 28px 2px 50px;
      border: 1px solid rgba(216,179,74,0.24);
      border-radius: 22px;
      padding: 26px 18px;
      text-align: center;
      background: rgba(19, 17, 12, 0.66);
      color: rgba(245,241,230,0.78);
      box-shadow: var(--shadow);
    }

    .no-results strong {
      display: block;
      color: var(--gold-2);
      font-family: 'Cinzel', Georgia, serif;
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 600;
    }

    footer {
      padding: 34px 20px 44px;
      text-align: center;
      border-top: 1px solid rgba(216,179,74,0.18);
      background:
        radial-gradient(circle at 50% 0, rgba(216,179,74,0.16), transparent 15rem),
        #030303;
    }

    .footer-title {
      margin: 0;
      font-family: 'Cinzel', Georgia, serif;
      color: var(--gold-2);
      font-size: 22px;
      letter-spacing: 0.04em;
    }

    .footer-sub {
      margin: 9px 0 0;
      color: rgba(245,241,230,0.58);
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .footer-line {
      width: 94px;
      height: 1px;
      margin: 18px auto;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .footer-thanks {
      margin: 0;
      color: rgba(245,241,230,0.68);
      font-size: 13px;
    }

    .back-top {
      position: fixed;
      right: max(14px, calc((100vw - 430px) / 2 + 14px));
      bottom: 18px;
      z-index: 60;
      border: 1px solid rgba(216,179,74,0.42);
      border-radius: 999px;
      padding: 11px 14px;
      color: #151006;
      background: linear-gradient(135deg, var(--gold-2), var(--gold));
      box-shadow: 0 12px 30px rgba(0,0,0,0.44), 0 0 20px rgba(216,179,74,0.18);
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .back-top.is-visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.84);
      backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal.is-open {
      display: flex;
    }

    .modal-card {
      width: min(100%, 430px);
      border: 1px solid rgba(216,179,74,0.32);
      background: rgba(9, 9, 9, 0.94);
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 28px 80px rgba(0,0,0,0.78);
    }

    .modal-image {
      width: 100%;
      aspect-ratio: 1.2 / 1;
      object-fit: cover;
      display: block;
    }

    .modal-info {
      padding: 17px 17px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .modal-name {
      margin: 0;
      font-family: 'Cinzel', Georgia, serif;
      color: var(--gold-2);
      font-size: 19px;
      line-height: 1.25;
    }

    .modal-price {
      margin-top: 7px;
      color: var(--text);
      font-weight: 700;
      font-size: 14px;
    }

    .modal-close {
      flex: 0 0 auto;
      border: 1px solid rgba(216,179,74,0.28);
      background: rgba(216,179,74,0.08);
      color: var(--gold-2);
      border-radius: 999px;
      padding: 10px 13px;
      cursor: pointer;
      font-weight: 800;
      font-size: 12px;
    }

    @keyframes logoRise {
      0% {
        opacity: 0;
        transform: translateY(26px) scale(0.96);
        filter: blur(6px);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes breathe {
      0%, 100% {
        transform: scale(1);
        opacity: 0.18;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.34;
      }
    }

    @media (max-width: 360px) {
      .menu-card {
        grid-template-columns: 92px 1fr;
      }

      .section-title {
        font-size: 21px;
      }

      .category-btn {
        padding: 11px 13px;
      }

      .item-name {
        font-size: 14px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }

      .menu-card {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="phone-frame" id="top">
    <div class="search-shell">
      <div class="search-wrap" role="search">
        <span class="search-mark" aria-hidden="true"></span>
        <input id="searchInput" type="search" placeholder="Kërko pije, koktej, verë..." autocomplete="off" aria-label="Kërko në menu">
        <button id="clearSearch" type="button" aria-label="Pastro kërkimin">Pastro</button>
      </div>
    </div>

    <header class="hero">
      <div class="logo-aura">
        <img class="brand-logo" src="logo/mels-longue-logo.png" alt="Mels Longue Bar logo">
      </div>
      <p class="eyebrow">Menu Digjitale</p>
      <h1>Mels Longue Bar</h1>
      <p class="subtitle">Menu Digjitale</p>
      <p class="support">Zgjidh kategorinë dhe shijo momentin.</p>
    </header>

    <nav class="category-nav" aria-label="Kategoritë e menusë">
      <div class="category-track" id="categoryTrack"></div>
    </nav>

    <main>
      <p class="status-line" id="statusLine"></p>
      <div id="menuRoot"></div>
      <div class="no-results" id="noResults">
        <strong>Nuk u gjet asnjë produkt.</strong>
        <span>Provo një emër tjetër ose pastro kërkimin.</span>
      </div>
    </main>

    <footer>
      <p class="footer-title">Mels Longue Bar</p>
      <p class="footer-sub">Menu Digjitale</p>
      <div class="footer-line"></div>
      <p class="footer-thanks">Faleminderit që na vizituat.</p>
    </footer>
  </div>

  <button class="back-top" id="backTop" type="button">Lart</button>

  <div class="modal" id="imageModal" aria-hidden="true">
    <div class="modal-card">
      <img class="modal-image" id="modalImage" alt="">
      <div class="modal-info">
        <div>
          <p class="modal-name" id="modalName"></p>
          <div class="modal-price" id="modalPrice"></div>
        </div>
        <button class="modal-close" id="modalClose" type="button">Mbyll</button>
      </div>
    </div>
  </div>

  <script>
    const MENU_ITEMS = [

      "vere-pinot-rose": "vere/vere-pinot-rose.webp",
      "vere-primitivo-12-mezzo": "vere/vere-primitivo-12-mezzo.webp",
      "vere-primitivo-zimfodel": "vere/vere-primitivo-zimfodel.webp",
      "vere-toscano": "vere/vere-toscano.webp",
      "vere-vere-chardonnay-puglia-e-bardhe": "vere/vere-vere-chardonnay-puglia-e-bardhe.webp"
    
    
};

    const menuRoot = document.getElementById("menuRoot");
    const categoryTrack = document.getElementById("categoryTrack");
    const searchInput = document.getElementById("searchInput");
    const clearSearch = document.getElementById("clearSearch");
    const noResults = document.getElementById("noResults");
    const statusLine = document.getElementById("statusLine");
    const backTop = document.getElementById("backTop");
    const imageModal = document.getElementById("imageModal");
    const modalImage = document.getElementById("modalImage");
    const modalName = document.getElementById("modalName");
    const modalPrice = document.getElementById("modalPrice");
    const modalClose = document.getElementById("modalClose");

    const sectionObservers = new Map();

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function normalizeText(value) {
      return String(value)
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/ë/g, "e")
        .replace(/ç/g, "c");
    }

    function slug(value) {
      return normalizeText(value).replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
    }

    function imageUrl(item) {
      if (CUSTOM_IMAGES[item.id]) return CUSTOM_IMAGES[item.id];
      const placeholderMap = {
        "Alkool": "alkool/_placeholder.webp",
        "Birra": "birra/_placeholder.webp",
        "Cocktails": "cocktails/_placeholder.webp",
        "Lëngje të Freskëta": "lengje-te-fresketa/_placeholder.webp",
        "Long Drinks": "long-drinks/_placeholder.webp",
        "Pije Freskuese": "pije-freskuese/_placeholder.webp",
        "Të Ngrohta": "te-ngrohta/_placeholder.webp",
        "Verë": "vere/_placeholder.webp",
        "Snacks": "snacks/_placeholder.webp",
        "Shisha": "shisha/_placeholder.webp"
      };
      return placeholderMap[item.category] || "placeholders/menu.webp";
    }

    function groupedItems(items) {
      return CATEGORIES.map(category => ({
        category,
        items: items.filter(item => item.category === category)
      })).filter(group => group.items.length);
    }

    function createCategoryNav() {
      categoryTrack.innerHTML = CATEGORIES.map((category, index) => `
        <button class="category-btn ${index === 0 ? "is-active" : ""}" type="button" data-category="${escapeHTML(category)}" data-target="${slug(category)}">
          ${escapeHTML(category)}
        </button>
      `).join("");

      categoryTrack.addEventListener("click", event => {
        const button = event.target.closest(".category-btn");
        if (!button) return;
        const target = document.getElementById(`section-${button.dataset.target}`);
        if (!target) return;
        target.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }

    function renderMenu(items, query = "") {
      menuRoot.innerHTML = "";
      const groups = groupedItems(items);

      groups.forEach(group => {
        const section = document.createElement("section");
        section.className = "menu-section";
        section.id = `section-${slug(group.category)}`;
        section.dataset.category = group.category;

        section.innerHTML = `
          <div class="section-head">
            <h2 class="section-title">${escapeHTML(group.category)}</h2>
            <div class="section-rule"></div>
            <span class="section-count">${group.items.length}</span>
          </div>
          <div class="cards">
            ${group.items.map(item => `
              <article class="menu-card" data-name="${escapeHTML(item.name)}" data-category="${escapeHTML(item.category)}" data-price="${escapeHTML(item.price)}" data-image="${imageUrl(item)}">
                <div class="photo">
                  <img src="${imageUrl(item)}" loading="lazy" alt="${escapeHTML(item.name)} - ${escapeHTML(item.category)}">
                </div>
                <div class="card-info">
                  <div>
                    <h3 class="item-name">${escapeHTML(item.name)}</h3>
                    <div class="item-cat">${escapeHTML(item.category)}</div>
                  </div>
                  <div class="price-row">
                    <span class="mini-line"></span>
                    <strong class="price">${escapeHTML(item.price)}</strong>
                  </div>
                </div>
              </article>
            `).join("")}
          </div>
        `;

        menuRoot.appendChild(section);
      });

      const hasResults = items.length > 0;
      noResults.style.display = hasResults ? "none" : "block";

      if (query.trim()) {
        statusLine.textContent = hasResults
          ? `${items.length} produkte u gjetën për "${query.trim()}".`
          : "";
      } else {
        statusLine.textContent = `${MENU_ITEMS.length} produkte në menu.`;
      }

      observeCards();
      observeSections();
    }

    function observeCards() {
      const cards = document.querySelectorAll(".menu-card");
      const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-visible");
            obs.unobserve(entry.target);
          }
        });
      }, { threshold: 0.16, rootMargin: "0px 0px -32px 0px" });

      cards.forEach(card => observer.observe(card));
    }

    function observeSections() {
      sectionObservers.forEach(observer => observer.disconnect());
      sectionObservers.clear();

      const sectionObserver = new IntersectionObserver(entries => {
        const visible = entries
          .filter(entry => entry.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];

        if (!visible) return;

        const category = visible.target.dataset.category;
        document.querySelectorAll(".category-btn").forEach(button => {
          const isActive = button.dataset.category === category;
          button.classList.toggle("is-active", isActive);
          if (isActive) {
            const targetLeft = button.offsetLeft - (categoryTrack.clientWidth / 2) + (button.offsetWidth / 2);
            categoryTrack.scrollTo({ left: Math.max(0, targetLeft), behavior: "smooth" });
          }
        });
      }, {
        threshold: [0.15, 0.35, 0.55],
        rootMargin: "-138px 0px -50% 0px"
      });

      document.querySelectorAll(".menu-section").forEach(section => sectionObserver.observe(section));
      sectionObservers.set("sections", sectionObserver);
    }

    function handleSearch() {
      const query = searchInput.value;
      const normalizedQuery = normalizeText(query).trim();

      clearSearch.classList.toggle("is-visible", normalizedQuery.length > 0);

      if (!normalizedQuery) {
        renderMenu(MENU_ITEMS, "");
        return;
      }

      const filtered = MENU_ITEMS.filter(item => {
        const haystack = normalizeText(`${item.name} ${item.category} ${item.price}`);
        return haystack.includes(normalizedQuery);
      });

      renderMenu(filtered, query);
    }

    function openModal(card) {
      modalImage.src = card.dataset.image;
      modalImage.alt = card.dataset.name;
      modalName.textContent = card.dataset.name;
      modalPrice.textContent = card.dataset.price;
      imageModal.classList.add("is-open");
      imageModal.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      imageModal.classList.remove("is-open");
      imageModal.setAttribute("aria-hidden", "true");
      modalImage.src = "";
    }

    searchInput.addEventListener("input", handleSearch);

    clearSearch.addEventListener("click", () => {
      searchInput.value = "";
      searchInput.focus();
      handleSearch();
    });

    menuRoot.addEventListener("click", event => {
      const image = event.target.closest(".photo img");
      if (!image) return;
      const card = event.target.closest(".menu-card");
      if (card) openModal(card);
    });

    modalClose.addEventListener("click", closeModal);
    imageModal.addEventListener("click", event => {
      if (event.target === imageModal) closeModal();
    });

    window.addEventListener("keydown", event => {
      if (event.key === "Escape") closeModal();
    });

    window.addEventListener("scroll", () => {
      backTop.classList.toggle("is-visible", window.scrollY > 520);
    }, { passive: true });

    backTop.addEventListener("click", () => {
      document.getElementById("top").scrollIntoView({ behavior: "smooth", block: "start" });
    });

    createCategoryNav();
    renderMenu(MENU_ITEMS);
  </script>
